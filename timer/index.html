<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER_TIMER // SYSTEM_ACTIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f7ff;
            --neon-pink: #ff0055;
            --dark-bg: #050505;
            --terminal-bg: rgba(0, 20, 20, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Share Tech Mono', monospace;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-cyan);
            overflow: hidden;
            /* Scanline effect */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }

        /* Cyberpunk Grid Background */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(var(--neon-cyan) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-cyan) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            transform: perspective(500px) rotateX(60deg);
            z-index: -1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .main-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .scrollable-content::-webkit-scrollbar {
            width: 8px;
        }

        .scrollable-content::-webkit-scrollbar-track {
            background: rgba(0, 247, 255, 0.1);
        }

        .scrollable-content::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.5);
        }

        .scrollable-content::-webkit-scrollbar-thumb:hover {
            background: var(--neon-pink);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--terminal-bg);
            border: 2px solid var(--neon-cyan);
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.2), inset 0 0 10px rgba(0, 247, 255, 0.1);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
            margin-bottom: 20px;
        }

        .header {
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--neon-cyan);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        /* Timer Display */
        #timer {
            font-size: 3.5rem;
            text-align: center;
            margin: 30px 0;
            text-shadow: 0 0 10px var(--neon-cyan);
            animation: glitch 1s infinite alternate-reverse;
            letter-spacing: 2px;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(1deg); }
            21% { transform: skew(-5deg); }
            22% { transform: skew(0deg); }
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            cursor: pointer;
            font-size: 1.2rem;
            text-transform: uppercase;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        button:active { transform: scale(0.95); }

        button.hidden {
            display: none;
        }

        /* Logs Section */
        .log-section {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 247, 255, 0.3);
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.7rem;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-cyan) transparent;
        }

        .log-section::-webkit-scrollbar {
            width: 6px;
        }

        .log-section::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 2px;
        }

        .log-entry {
            margin-bottom: 5px;
            border-left: 2px solid var(--neon-pink);
            padding-left: 10px;
            opacity: 0.8;
        }

        .log-entry span { color: var(--neon-pink); }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .stat-box {
            background: rgba(0, 247, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            padding: 15px;
            text-align: center;
            clip-path: polygon(5% 0, 100% 0, 100% 95%, 95% 100%, 0 100%, 0 5%);
            position: relative;
            overflow: hidden;
        }

        .stat-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 247, 255, 0.2), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--neon-pink);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            letter-spacing: 1px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--terminal-bg);
            border: 2px solid var(--neon-cyan);
            padding: 40px 30px;
            max-width: 500px;
            width: 90%;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
            box-shadow: 0 0 30px rgba(0, 247, 255, 0.4), inset 0 0 20px rgba(0, 247, 255, 0.1);
            animation: modalSlide 0.3s ease-out;
        }

        @keyframes modalSlide {
            from {
                transform: scale(0.7) translateY(-50px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: var(--neon-pink);
            text-transform: uppercase;
            text-align: center;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 30px;
        }

        .step {
            width: 30px;
            height: 30px;
            border: 1px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .step.active {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .step.completed {
            background: var(--neon-pink);
            color: white;
            border-color: var(--neon-pink);
        }

        .modal-text {
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: var(--neon-cyan);
            letter-spacing: 1px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
        }

        .modal-button {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--neon-cyan);
            background: transparent;
            color: var(--neon-cyan);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: 0.3s;
            clip-path: polygon(5% 0, 100% 0, 100% 95%, 95% 100%, 0 100%, 0 5%);
        }

        .modal-button:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .modal-button.proceed {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        .modal-button.proceed:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        /* Longest Streak Mobile */
        .longest-streak-mobile {
            display: none;
        }

        @media (max-width: 768px) {
            .longest-streak-mobile {
                display: block;
                background: linear-gradient(135deg, rgba(255, 0, 85, 0.1), rgba(0, 247, 255, 0.1));
                border: 2px solid var(--neon-pink);
                padding: 25px;
                margin: 20px 0;
                text-align: center;
                clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
                box-shadow: 0 0 20px rgba(255, 0, 85, 0.3), inset 0 0 10px rgba(255, 0, 85, 0.1);
                animation: streakPulse 2s ease-in-out infinite;
            }

            .streak-label {
                font-size: 0.9rem;
                letter-spacing: 3px;
                color: var(--neon-pink);
                text-transform: uppercase;
                margin-bottom: 15px;
            }

            .streak-value {
                font-size: 2.5rem;
                color: var(--neon-pink);
                text-shadow: 0 0 20px var(--neon-pink);
                letter-spacing: 2px;
                font-weight: bold;
            }

            @keyframes streakPulse {
                0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 85, 0.3), inset 0 0 10px rgba(255, 0, 85, 0.1); }
                50% { box-shadow: 0 0 30px rgba(255, 0, 85, 0.6), inset 0 0 15px rgba(255, 0, 85, 0.2); }
            }

            #timer {
                font-size: 2.5rem;
            }

            .container {
                padding: 20px;
            }

            button {
                font-size: 1rem;
                padding: 12px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            #timer {
                font-size: 2rem;
                margin: 20px 0;
            }

            .container {
                padding: 15px;
                margin-bottom: 15px;
            }

            .header {
                font-size: 0.7rem;
            }

            button {
                font-size: 0.9rem;
                padding: 10px;
            }

            .controls {
                gap: 10px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .streak-value {
                font-size: 2rem;
            }

            .modal-content {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="scrollable-content">
        <div class="container">
            <div class="header">
                <span>STATUS: ONLINE</span>
                <span>SYS_LOG_PERSIST_V.1.0</span>
            </div>

            <div id="timer">00:00:00:00</div>

            <div class="controls">
                <button id="startBtn" onclick="startTimer()">Start</button>
                <button id="resetBtn" class="hidden" onclick="openResetConfirmation()" style="border-color: var(--neon-cyan); color: var(--neon-cyan);">Reset</button>
            </div>

            <!-- Longest Streak Mobile Only -->
            <div class="longest-streak-mobile">
                <div class="streak-label">⚡ Longest Time Streak ⚡</div>
                <div class="streak-value" id="longestStreakValue">0 DAYS</div>
            </div>

            <!-- Stats Section -->
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Current Streak</div>
                    <div class="stat-value" id="currentStreak">0:00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Longest Streak</div>
                    <div class="stat-value" id="longestStreak">0:00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Sessions</div>
                    <div class="stat-value" id="totalSessions">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Average Time</div>
                    <div class="stat-value" id="averageTime">0:00</div>
                </div>
            </div>

            <div class="header" style="border-bottom: none; border-top: 1px solid var(--neon-cyan); padding-top: 5px;">
                <span>SYSTEM_LOGS</span>
            </div>
            <div class="log-section" id="logs">
                <div class="log-entry">INITIALIZING...</div>
            </div>
        </div>
    </div>
</div>

<!-- Reset Confirmation Modal -->
<div id="resetModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="modalTitle">CONFIRM: ERASE ALL DATA?</div>
        
        <div class="step-indicator">
            <div class="step active" id="step1">1</div>
            <div class="step" id="step2">2</div>
            <div class="step" id="step3">3</div>
        </div>

        <div class="modal-text" id="modalText">
            This action will erase all timer data and logs. Click PROCEED to continue.
        </div>

        <div class="modal-buttons">
            <button class="modal-button" onclick="closeResetConfirmation()">Cancel</button>
            <button class="modal-button proceed" onclick="proceedReset()" id="proceedBtn">Proceed</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const REDIS_URL = "https://eminent-bulldog-76184.upstash.io";
    const REDIS_TOKEN = "gQAAAAAAASmYAAIgcDEwZWMyMzZhOTY3ZmE0ODY2OGU4ODcxMGZhZTUzOTgwYw";

    let startTime = null;
    let isRunning = false;
    let intervalId = null;
    let resetStep = 0;

    const resetMessages = [
        { title: "CONFIRM: ERASE ALL DATA?", text: "This action will erase all timer data and logs. Click PROCEED to continue." },
        { title: "WARNING: THIS CANNOT BE UNDONE", text: "All sessions, logs, and statistics will be permanently deleted. Are you sure?" },
        { title: "FINAL CONFIRMATION REQUIRED", text: "Click PROCEED one more time to execute complete data purge." }
    ];

    async function api(cmd, ...args) {
        const response = await fetch(`${REDIS_URL}/${cmd}/${args.join('/')}`, {
            headers: { Authorization: `Bearer ${REDIS_TOKEN}` }
        });
        return response.json();
    }

    // Sync state from server on load
    async function sync() {
        const res = await api('GET', 'timer_state');
        const logs = await api('LRANGE', 'timer_logs', '0', '-1');
        const stats = await api('GET', 'timer_stats');

        if (res.result) {
            const state = JSON.parse(res.result);
            startTime = state.startTime;
            isRunning = state.isRunning;
            if (isRunning) startLocalTimer();
            updateUI();
        }

        const logContainer = document.getElementById('logs');
        logContainer.innerHTML = '';
        if (logs.result) {
            logs.result.reverse().forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerHTML = decodeURIComponent(log);
                logContainer.appendChild(div);
            });
        }

        if (stats.result) {
            const statsData = JSON.parse(stats.result);
            updateStats(statsData);
        }
    }

    function formatTime(ms) {
        let totalSecs = Math.floor(ms / 1000);
        let days = Math.floor(totalSecs / 86400);
        let hrs = Math.floor((totalSecs % 86400) / 3600);
        let mins = Math.floor((totalSecs % 3600) / 60);
        let secs = totalSecs % 60;
        return `${String(days).padStart(2, '0')}:${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function formatShortTime(ms) {
        let totalSecs = Math.floor(ms / 1000);
        let mins = Math.floor(totalSecs / 60);
        let secs = totalSecs % 60;
        return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function formatDays(ms) {
        let totalSecs = Math.floor(ms / 1000);
        let days = Math.floor(totalSecs / 86400);
        return days === 1 ? `${days} DAY` : `${days} DAYS`;
    }

    function startLocalTimer() {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(() => {
            if (startTime) {
                const elapsed = Date.now() - startTime;
                document.getElementById('timer').innerText = formatTime(elapsed);
                updateCurrentStreak(elapsed);
            }
        }, 1000);
    }

    function updateUI() {
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        if (isRunning) {
            startBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
        } else {
            startBtn.classList.remove('hidden');
            resetBtn.classList.add('hidden');
        }
    }

    function updateCurrentStreak(elapsed) {
        document.getElementById('currentStreak').innerText = formatShortTime(elapsed);
    }

    function updateStats(stats) {
        document.getElementById('longestStreak').innerText = formatShortTime(stats.longestTime || 0);
        document.getElementById('totalSessions').innerText = stats.totalSessions || 0;
        document.getElementById('averageTime').innerText = formatShortTime(stats.averageTime || 0);
        document.getElementById('longestStreakValue').innerText = formatDays(stats.longestTime || 0);
    }

    async function startTimer() {
        if (isRunning) return;
        startTime = Date.now();
        isRunning = true;
        const timestamp = new Date().toLocaleString();
        const logMsg = `<span>[${timestamp}]</span> TIMER_STARTED`;
        
        await api('SET', 'timer_state', JSON.stringify({ startTime, isRunning }));
        await api('LPUSH', 'timer_logs', encodeURIComponent(logMsg));
        
        updateUI();
        startLocalTimer();
        sync();
    }

    function openResetConfirmation() {
        resetStep = 0;
        updateResetModal();
        document.getElementById('resetModal').classList.add('show');
    }

    function closeResetConfirmation() {
        document.getElementById('resetModal').classList.remove('show');
        resetStep = 0;
    }

    function updateResetModal() {
        const modal = resetMessages[resetStep];
        document.getElementById('modalTitle').innerText = modal.title;
        document.getElementById('modalText').innerText = modal.text;
        
        // Update step indicators
        for (let i = 0; i < 3; i++) {
            const step = document.getElementById(`step${i + 1}`);
            if (i < resetStep) {
                step.classList.add('completed');
                step.classList.remove('active');
            } else if (i === resetStep) {
                step.classList.add('active');
                step.classList.remove('completed');
            } else {
                step.classList.remove('active', 'completed');
            }
        }
    }

    async function proceedReset() {
        resetStep++;
        
        if (resetStep < 3) {
            updateResetModal();
        } else {
            // Execute reset
            await executeReset();
            closeResetConfirmation();
        }
    }

    async function executeReset() {
        startTime = null;
        isRunning = false;
        clearInterval(intervalId);
        document.getElementById('timer').innerText = "00:00:00:00";
        
        const timestamp = new Date().toLocaleString();
        const logMsg = `<span>[${timestamp}]</span> TIMER_RESET_BY_USER`;
        
        await api('SET', 'timer_state', JSON.stringify({ startTime, isRunning }));
        await api('LPUSH', 'timer_logs', encodeURIComponent(logMsg));
        
        updateUI();
        sync();
    }

    // Initialize
    sync();
</script>
</body>
</html>
